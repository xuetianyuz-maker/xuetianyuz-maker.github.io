<DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国中铁法律合规信息系统v1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f8f8f8;
            padding: 10px;
        }
        /* 合同信息标题栏 - 字体调小 */
        .contract-header {
            background-color: #000;
            color: #fff;
            padding: 20px 20px; /* 内边距适配字体 */
            font-size: 20px; /* 原28px → 调小为20px */
            font-weight: 500;
            border-radius: 6px 6px 0 0;
        }
        /* 信息列表容器 */
        .info-container {
            background-color: #fff;
            border: 1px solid #e5e5e5;
            border-top: none;
            border-radius: 0 0 6px 6px;
        }
        /* 信息项 - 内边距适配字体 */
        .info-item {
            padding: 18px 20px; /* 原24px → 调小为18px */
            border-bottom: 1px solid #e5e5e5;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        /* 标签样式：加粗 + 字体调小 */
        .info-label {
            font-size: 16px; /* 原24px → 调小为16px */
            color: #666;
            text-align: center;
            margin-bottom: 10px; /* 原16px → 调小为10px */
            font-weight: bold; /* 新增：标签加粗 */
        }
        /* 值样式：字体调小 */
        .info-value {
            font-size: 14px; /* 原22px → 调小为14px */
            color: #999;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="contract-header">合同信息</div>
    <div class="info-container">
        <div class="info-item">
            <div class="info-label">合同编号</div>
            <div class="info-value">HNGJ-2025-Z-16</div>
        </div>
        <div class="info-item">
            <div class="info-label">合同名称</div>
            <div class="info-value">材料采购合同</div>
        </div>
        <div class="info-item">
            <div class="info-label">合同标的额（万元）</div>
            <div class="info-value">192.91</div>
        </div>
        <div class="info-item">
            <div class="info-label">对方单位</div>
            <div class="info-value">万势(深圳)国际供应链有限公司,中铁一局集团（海南）国际建设有限公司</div>
        </div>
    </div>
</body>
</html>
