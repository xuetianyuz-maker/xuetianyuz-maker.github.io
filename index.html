<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同信息</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 10px;
        }
        .contract-header {
            background: #000;
            color: #fff;
            padding: 25px 20px;
            font-size: 24px;
            border-radius: 6px 6px 0 0;
        }
        .info-container {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 6px 6px;
        }
        .info-item {
            padding: 22px 20px;
            border-bottom: 1px solid #e5e5e5;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            font-size: 20px;
            color: #666;
            text-align: center;
            margin-bottom: 12px;
        }
        .info-value {
            font-size: 18px;
            color: #999;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="contract-header">合同信息</div>
    <div class="info-container">
        <div class="info-item">
            <div class="info-label">合同编号</div>
            <div class="info-value">HNGJ-2025-033</div>
        </div>
        <div class="info-item">
            <div class="info-label">合同名称</div>
            <div class="info-value">材料采购合同</div>
        </div>
        <div class="info-item">
            <div class="info-label">合同标的额（万元）</div>
            <div class="info-value">192.91</div>
        </div>
        <div class="info-item">
            <div class="info-label">对方单位</div>
            <div class="info-value">万势(深圳)国际供应链有限公司,中铁一局集团（海南）国际建设有限公司</div>
        </div>
    </div>
</body>
</html>
